
server.port=8080

spring.datasource.url=jdbc:h2:mem:seadb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=ChaveSecretaSuperLongaParaOProjetoSEADesafioBackend2024
app.jwt.expiracao=86400000

app.cors.origens-permitidas=http://localhost:3000,http://localhost:5173
